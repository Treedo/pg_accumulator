name: C/C++ CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PG_CONFIG: /usr/lib/postgresql/17/bin/pg_config
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install PostgreSQL 17 build dependencies (PGDG)
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg wget lsb-release
          # Add the PGDG repository key and source list (signed-by modern approach)
          wget -qO - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-server-dev-17 build-essential

      - name: "Debug: pg config & packages"
        run: |
          lsb_release -a || true
          apt-cache policy postgresql-server-dev-17 || true
          /usr/lib/postgresql/17/bin/pg_config --version || pg_config --version || true

      - name: Build extension with PGXS
        run: |
          make clean
          make USE_PGXS=1

      - name: Stage extension install
        run: make install USE_PGXS=1 DESTDIR="$GITHUB_WORKSPACE/install"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Docker Compose version
        run: docker compose version

      - name: Run Docker-based pgTAP suite
        run: docker compose -f docker/docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test-runner

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.test.yml logs --no-color

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v --remove-orphans
