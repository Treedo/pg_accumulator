name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install PostgreSQL build dependencies
        run: |
          sudo apt-get update
          # Find available postgresql-server-dev-N packages and install the highest version available
          available_versions=$(apt-cache pkgnames 'postgresql-server-dev-*' | grep -E '^postgresql-server-dev-[0-9]+' | sed -E 's/postgresql-server-dev-//')
          if [ -n "$available_versions" ]; then
            chosen=$(echo "$available_versions" | sort -nr | head -n1)
            echo "Installing postgresql-server-dev-$chosen"
            sudo apt-get install -y build-essential postgresql-server-dev-"$chosen"
          else
            # fallback when no specific dev package found: install libpq headers
            echo "No postgresql-server-dev-N packages found; installing libpq-dev as a fallback"
            sudo apt-get install -y build-essential libpq-dev
          fi

      - name: Build extension with PGXS
        run: |
          export PG_CONFIG=$(which pg_config)
          echo "Using PG_CONFIG=$PG_CONFIG"
          if which pg_config &>/dev/null; then
            pg_config --version
          else
            echo "pg_config not found"
          fi
          echo "Installed PostgreSQL packages:"
          dpkg -l 'postgresql-*' postgresql-common || true
          make clean
          make USE_PGXS=1

      - name: Stage extension install
        run: |
          export PG_CONFIG=$(which pg_config)
          make install USE_PGXS=1 DESTDIR="$GITHUB_WORKSPACE/install"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Docker Compose version
        run: docker compose version

      - name: Run Docker-based pgTAP suite
        run: docker compose -f docker/docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test-runner

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.test.yml logs --no-color

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v --remove-orphans
